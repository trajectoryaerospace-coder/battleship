<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLESHIP • NAVAL WARFARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(180deg, #020617 0%, #050b14 100%);
            color: white;
            overflow-x: hidden;
        }
        
        .grid-board {
            display: grid;
            gap: 3px;
            background: #0b1528;
            padding: 10px;
            border: 6px solid #1e3a8a;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(30, 58, 138, 0.6);
        }
        
        .cell {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(96, 165, 250, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Water ripple animation */
        .cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
            animation: oceanWaves 4s infinite linear;
            background-size: 200% 200%;
        }

        @keyframes oceanWaves {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }
        
        .cell:hover {
            background: #3b82f6;
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 12px #60a5fa;
        }
        
        .cell.own-ship {
            background: linear-gradient(135deg, #15803d 0%, #22c55e 100%);
            border-color: #4ade80;
        }
        
        .cell.hit {
            background: linear-gradient(135deg, #991b1b 0%, #ef4444 100%);
            border-color: #f87171;
            animation: impactShake 0.4s ease-in-out;
        }
        
        .cell.miss {
            background: linear-gradient(135deg, #334155 0%, #64748b 100%);
            border-color: #94a3b8;
            opacity: 0.7;
        }
        
        .cell.sunk {
            background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 100%) !important;
            border-color: #ef4444 !important;
            animation: sinkDestruction 0.6s infinite alternate;
        }

        @keyframes impactShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px) rotate(-3deg); }
            75% { transform: translateX(4px) rotate(3deg); }
        }

        @keyframes sinkDestruction {
            0% { box-shadow: inset 0 0 15px #000, 0 0 5px #ef4444; }
            100% { box-shadow: inset 0 0 15px #000, 0 0 20px #b91c1c; }
        }

        /* Floating Alert Overlay Animation */
        @keyframes fxPop {
            0% { transform: translate(-50%, -30%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -70%) scale(0.8); opacity: 0; }
        }

        .fx-overlay {
            animation: fxPop 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Custom scrollbar for tactical chat view */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #020617;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 3px;
        }
        
        .ship-preview {
            background: rgba(34, 197, 94, 0.5) !important;
            border: 2px dashed #4ade80 !important;
        }
        
        .header-font {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="fx-container" class="pointer-events-none fixed inset-0 z-50 overflow-hidden"></div>

    <div class="w-full max-w-[1600px] mx-auto p-4 flex-grow flex flex-col">
        <h1 class="text-3xl md:text-5xl font-bold text-center my-4 text-blue-400 header-font tracking-wider">BATTLESHIP</h1>

        <div class="flex flex-col lg:flex-row gap-6 items-stretch justify-center flex-grow">
            
            <div class="flex-grow flex flex-col justify-center items-center bg-slate-950/40 border-2 border-slate-800 rounded-3xl p-6 relative min-h-[550px]">
                
                <div id="menu-screen" class="text-center my-auto">
                    <button onclick="findOpponent()" class="block mx-auto px-10 py-6 bg-blue-600 hover:bg-blue-700 text-xl font-bold rounded-2xl transition-all transform hover:scale-105 shadow-lg shadow-blue-900/50">
                        FIND OPPONENT
                    </button>
                </div>

                <div id="matchmaking-screen" class="hidden text-center my-auto">
                    <div class="text-6xl mb-6 animate-bounce text-blue-500">⚓</div>
                    <h2 class="text-xl font-bold text-slate-300 animate-pulse">SCANNING NAVAL FREQUENCIES...</h2>
                    <button onclick="cancelMatchmaking()" class="mt-8 px-6 py-3 bg-red-900/80 hover:bg-red-800 rounded-xl font-bold text-xs transition-all tracking-wider">ABORT SEARCH</button>
                </div>

                <div id="setup-screen" class="hidden w-full flex flex-col items-center my-auto">
                    <h2 id="setup-title" class="text-sm md:text-md font-bold text-emerald-400 text-center mb-4 tracking-wide">INITIALIZING FLEET CONFIGURATION...</h2>
                    <div id="setup-board" class="grid-board w-max mx-auto"></div>
                    
                    <div class="mt-6 flex flex-wrap justify-center gap-4">
                        <button onclick="toggleRotation()" id="rotate-btn" class="px-5 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl font-bold flex items-center gap-2 text-xs transition-all">
                            <i class="fas fa-sync-alt text-blue-400"></i> ROTATE SHIP (R)
                        </button>
                        <button onclick="randomPlacement()" class="px-5 py-3 bg-blue-950 hover:bg-blue-900 border border-blue-700 rounded-xl font-bold text-xs transition-all">AUTO-DEPLOY</button>
                    </div>
                    
                    <div class="text-center mt-6">
                        <button onclick="confirmReady()" id="ready-btn" disabled class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-black text-md font-bold rounded-xl disabled:opacity-30 disabled:cursor-not-allowed transition-all shadow-lg">
                            CONFIRM DEPLOYMENT
                        </button>
                    </div>
                </div>

                <div id="game-screen" class="hidden w-full flex flex-wrap justify-center items-center gap-8 my-auto">
                    <div class="w-max">
                        <h2 class="text-emerald-400 text-sm font-bold text-center mb-3 tracking-wider">⚡ YOUR FLEET</h2>
                        <div id="player-board-game" class="grid-board mx-auto"></div>
                    </div>
                    <div class="w-max">
                        <h2 class="text-red-400 text-sm font-bold text-center mb-3 tracking-wider">🎯 ENEMY WATERS</h2>
                        <div id="opponent-board" class="grid-board mx-auto"></div>
                    </div>
                </div>

            </div>

            <div id="chat-panel" class="opacity-30 pointer-events-none w-full lg:w-[380px] bg-slate-950 border-4 border-slate-900 rounded-3xl flex flex-col h-[500px] lg:h-auto transition-all duration-300">
                <div class="bg-slate-900 px-4 py-3 border-b-2 border-slate-800 flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
                    <h3 class="text-xs font-bold tracking-widest text-slate-400">TACTICAL RADIO COMMS</h3>
                </div>
                <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-3 text-[10px] custom-scroll flex flex-col">
                    <div class="text-slate-500 text-center my-auto italic">RADIO OFFLINE • ESTABLISH ROOM MATCHMAKING</div>
                </div>
                <form id="chat-form" onsubmit="sendChatMessage(event)" class="p-3 bg-slate-900/60 border-t-2 border-slate-800 flex gap-2">
                    <input type="text" id="chat-input" placeholder="Type transmission..." autocomplete="off" maxlength="120" class="flex-grow bg-black border border-slate-700 rounded-xl px-3 py-2 text-[11px] focus:outline-none focus:border-blue-500 text-white placeholder-slate-600">
                    <button type="submit" class="bg-blue-700 hover:bg-blue-600 text-white px-4 rounded-xl transition-all"><i class="fas fa-paper-plane text-xs"></i></button>
                </form>
            </div>

        </div>

        <div id="status-bar" class="mt-4 bg-slate-950 border-2 border-blue-900 px-6 py-3 rounded-xl text-center text-xs tracking-widest font-bold hidden shadow-md">
            <span id="status-text" class="text-yellow-400 animate-pulse">ESTABLISHING CONNECTION SYNC...</span>
        </div>
    </div>

    <div id="win-modal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-slate-950 border-4 border-yellow-500 p-8 m-4 rounded-2xl text-center max-w-md shadow-2xl">
            <div id="modal-icon" class="text-6xl mb-4">🏆</div>
            <h2 id="modal-title" class="text-2xl font-bold mb-3 tracking-wide">VICTORY</h2>
            <p id="modal-subtitle" class="text-xs mb-6 text-slate-400 leading-relaxed">The opponent's command core has been permanently neutralized.</p>
            <button onclick="requestRematch()" class="px-8 py-4 bg-yellow-500 text-black text-sm font-bold rounded-xl hover:bg-yellow-400 transition-all shadow-md transform hover:scale-105 tracking-wider">
                PLAY AGAIN (REMATCH)
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEeoUNuFrJImksTlnBpL6H1CKrozCwvKY",
            authDomain: "battleshipforzan.firebaseapp.com",
            projectId: "battleshipforzan",
            storageBucket: "battleshipforzan.firebasestorage.app",
            messagingSenderId: "131379626805",
            appId: "1:131379626805:web:981d95d5db353b70d9427c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GRID_SIZE = 15;
        const TOTAL_SHIP_TILES = 17; 
        
        let roomId = null;
        let myPlayerId = null;
        let opponentPlayerId = null;
        let gameRef = null;
        
        let playerBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let opponentBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        
        let hitsOnMe = [];
        let hitsOnOpponent = [];
        let currentShipIndex = 0;
        let isVertical = true;
        let isMyTurn = false;
        let gameStarted = false;
        
        let setupGrid = null;
        let playerGameGrid = null;
        let opponentGameGrid = null;

        const SHIP_TYPES = [
            {id:1, name:"CARRIER", size:5},
            {id:2, name:"BATTLESHIP", size:4},
            {id:3, name:"CRUISER", size:3},
            {id:4, name:"SUBMARINE", size:3},
            {id:5, name:"DESTROYER", size:2}
        ];

        function createGrid(id, isSetup = false) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    if (isSetup) {
                        cell.addEventListener('click', () => placeShip(x, y));
                        cell.addEventListener('mouseover', () => previewShip(x, y));
                        cell.addEventListener('mouseout', clearPreview);
                    } else if (id === 'opponent-board') {
                        cell.addEventListener('click', () => fireShot(x, y));
                    }
                    container.appendChild(cell);
                }
            }
            return container;
        }

        function updateSetupTitle() {
            const title = document.getElementById('setup-title');
            if (currentShipIndex < SHIP_TYPES.length) {
                const ship = SHIP_TYPES[currentShipIndex];
                title.textContent = `ALLOCATE COMMAND ASSETS: PLACE ${ship.name} (SIZE: ${ship.size})`;
            } else {
                title.textContent = "FLEET INTEGRITY VERIFIED! CONFIRM READINESS";
            }
        }

        function previewShip(x, y) {
            clearPreview();
            if (currentShipIndex >= SHIP_TYPES.length) return;
            const ship = SHIP_TYPES[currentShipIndex];
            
            let valid = true;
            const cellsToHighlight = [];

            for (let i = 0; i < ship.size; i++) {
                const cx = isVertical ? x : x + i;
                const cy = isVertical ? y + i : y;
                
                if (cx >= GRID_SIZE || cy >= GRID_SIZE || playerBoard[cy][cx] !== 0) {
                    valid = false;
                    break;
                }
                cellsToHighlight.push({cx, cy});
            }

            cellsToHighlight.forEach(pos => {
                const cell = getCell(setupGrid, pos.cx, pos.cy);
                if (cell) cell.classList.add('ship-preview');
            });
        }

        function clearPreview() {
            document.querySelectorAll('.ship-preview').forEach(c => c.classList.remove('ship-preview'));
        }

        function getCell(grid, x, y) {
            return Array.from(grid.children).find(c => +c.dataset.x === x && +c.dataset.y === y);
        }

        function placeShip(x, y) {
            if (currentShipIndex >= SHIP_TYPES.length) return;
            const ship = SHIP_TYPES[currentShipIndex];
            let valid = true;
            const positions = [];
            
            for (let i = 0; i < ship.size; i++) {
                const cx = isVertical ? x : x + i;
                const cy = isVertical ? y + i : y;
                if (cx >= GRID_SIZE || cy >= GRID_SIZE || playerBoard[cy][cx] !== 0) {
                    valid = false;
                    break;
                }
                positions.push({x: cx, y: cy});
            }
            
            if (!valid) return;
            
            positions.forEach(p => playerBoard[p.y][p.x] = ship.id);
            currentShipIndex++;
            
            renderBoard(setupGrid, playerBoard, [], true);
            updateSetupTitle();
            
            if (currentShipIndex >= SHIP_TYPES.length) {
                document.getElementById('ready-btn').disabled = false;
            }
        }

        function toggleRotation() {
            isVertical = !isVertical;
        }

        function randomPlacement() {
            playerBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            currentShipIndex = 0;
            
            SHIP_TYPES.forEach((ship) => {
                let placed = false;
                let tries = 0;
                while (!placed && tries < 500) {
                    tries++;
                    const vert = Math.random() > 0.5;
                    const maxX = vert ? GRID_SIZE : GRID_SIZE - ship.size;
                    const maxY = vert ? GRID_SIZE - ship.size : GRID_SIZE;
                    const sx = Math.floor(Math.random() * maxX);
                    const sy = Math.floor(Math.random() * maxY);
                    
                    let ok = true;
                    for (let i = 0; i < ship.size; i++) {
                        const cx = vert ? sx : sx + i;
                        const cy = vert ? sy + i : sy;
                        if (playerBoard[cy][cx] !== 0) {
                            ok = false;
                            break;
                        }
                    }
                    if (ok) {
                        for (let i = 0; i < ship.size; i++) {
                            const cx = vert ? sx : sx + i;
                            const cy = vert ? sy + i : sy;
                            playerBoard[cy][cx] = ship.id;
                        }
                        placed = true;
                    }
                }
            });
            currentShipIndex = SHIP_TYPES.length;
            renderBoard(setupGrid, playerBoard, [], true);
            updateSetupTitle();
            document.getElementById('ready-btn').disabled = false;
        }

        async function findOpponent() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('matchmaking-screen').classList.remove('hidden');
            
            const lobbyRef = db.ref('battleship_lobby');
            
            lobbyRef.transaction((currentLobby) => {
                if (currentLobby === null) {
                    roomId = 'room_' + Math.random().toString(36).substring(2, 11);
                    myPlayerId = 'player1';
                    opponentPlayerId = 'player2';
                    return { hostRoomId: roomId };
                } else {
                    roomId = currentLobby.hostRoomId;
                    myPlayerId = 'player2';
                    opponentPlayerId = 'player1';
                    return {}; 
                }
            }, async (error, committed, snapshot) => {
                if (error) {
                    alert("Database link down.");
                    cancelMatchmaking();
                    return;
                }
                
                gameRef = db.ref('games/' + roomId);
                
                if (myPlayerId === 'player1') {
                    await gameRef.set({
                        player1: { ready: false, board: "" },
                        turn: 'player1',
                        phase: 'setup'
                    });
                    
                    gameRef.child('player2').on('value', (snap) => {
                        if (snap.exists()) {
                            lobbyRef.remove(); 
                            gameRef.child('player2').off(); 
                            activateTacticalSystems();
                        }
                    });
                } else {
                    await gameRef.child('player2').set({ ready: false, board: "" });
                    activateTacticalSystems();
                }
            });
        }

        function cancelMatchmaking() {
            if (roomId) {
                db.ref('games/' + roomId).remove();
                db.ref('battleship_lobby').remove();
            }
            document.getElementById('matchmaking-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function activateTacticalSystems() {
            document.getElementById('matchmaking-screen').classList.add('hidden');
            
            // Wake Up Persistent Chat layout Module
            const chatPanel = document.getElementById('chat-panel');
            chatPanel.classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('chat-messages').innerHTML = `<div class="text-emerald-500 text-center py-2 border border-emerald-900 bg-emerald-950/20 rounded-xl">COMMS SECURED • ROOM COMMENCING</div>`;
            
            // Direct chat listeners binding to persistent data block
            gameRef.child('chat').off();
            gameRef.child('chat').on('child_added', (snap) => {
                appendChatMessage(snap.val());
            });

            enterSetupPhase();
        }

        function enterSetupPhase() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('status-bar').classList.remove('hidden');
            document.getElementById('status-text').textContent = "CONFIGURING FLEET GRID ARRAY...";
            
            currentShipIndex = 0;
            playerBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            document.getElementById('ready-btn').disabled = true;
            document.getElementById('ready-btn').textContent = "CONFIRM DEPLOYMENT";
            
            setupGrid = createGrid('setup-board', true);
            updateSetupTitle();
            
            gameRef.child('phase').off();
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (!data || !data.player1 || !data.player2) return;
                
                // Track dynamic structural shifts or manual resets triggered by playAgain properties
                if (data.phase === 'setup' && gameStarted) {
                    gameStarted = false;
                    enterSetupPhase();
                }
                
                if (data.player1.ready && data.player2.ready && !gameStarted) {
                    startFullGame(data);
                }
            });
        }

        function confirmReady() {
            gameRef.child(myPlayerId).update({
                ready: true, 
                board: JSON.stringify(playerBoard)
            });
            document.getElementById('ready-btn').disabled = true;
            document.getElementById('ready-btn').textContent = "WAITING FOR ENEMY...";
        }

        function startFullGame(gameData) {
            gameStarted = true;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            playerGameGrid = createGrid('player-board-game', false);
            opponentGameGrid = createGrid('opponent-board', false);
            
            const oppKey = opponentPlayerId;
            opponentBoard = JSON.parse(gameData[oppKey].board);
            
            hitsOnMe = [];
            hitsOnOpponent = [];
            
            renderBoard(playerGameGrid, playerBoard, hitsOnMe, true);
            renderBoard(opponentGameGrid, opponentBoard, hitsOnOpponent, false);
            
            gameRef.child('turn').on('value', (snap) => {
                const currentTurn = snap.val();
                isMyTurn = (currentTurn === myPlayerId);
                const statusBar = document.getElementById('status-text');
                if (isMyTurn) {
                    statusBar.textContent = "YOUR TURN • WEAPONS ENGAGED";
                    statusBar.className = "text-emerald-400 animate-pulse";
                } else {
                    statusBar.textContent = "ENEMY TURN • EVASIVE ACTION REQ";
                    statusBar.className = "text-red-400";
                }
            });

            gameRef.child('moves').off();
            gameRef.child('moves').on('child_added', (snap) => {
                handleMoveProcessed(snap.val());
            });
        }

        function fireShot(x, y) {
            if (!isMyTurn) return;
            if (hitsOnOpponent.some(h => h.x === x && h.y === y)) return;
            
            const isHit = opponentBoard[y][x] > 0;
            
            gameRef.child('moves').push({
                player: myPlayerId,
                x: x,
                y: y,
                hit: isHit
            });
            
            // STREAK FIRE RULE: If a target was struck, pass change-turn updates completely
            if (!isHit) {
                gameRef.child('turn').set(opponentPlayerId);
            }
        }

        function handleMoveProcessed(move) {
            const targetCoordinate = { x: move.x, y: move.y };
            const isHit = move.hit;
            
            if (move.player === myPlayerId) {
                hitsOnOpponent.push(targetCoordinate);
                renderBoard(opponentGameGrid, opponentBoard, hitsOnOpponent, false);
                triggerVisualPopupAlert(isHit ? "HIT!" : "MISS!", isHit);
                checkEndGameCondition();
            } else {
                hitsOnMe.push(targetCoordinate);
                renderBoard(playerGameGrid, playerBoard, hitsOnMe, true);
                triggerVisualPopupAlert(isHit ? "ENEMY HIT!" : "ENEMY MISS!", !isHit);
                checkEndGameCondition();
            }
        }

        function triggerVisualPopupAlert(text, isPositive) {
            const container = document.getElementById('fx-container');
            const alertBox = document.createElement('div');
            alertBox.className = `fx-overlay fixed left-1/2 top-1/2 px-8 py-4 border-4 rounded-xl text-xl md:text-3xl font-bold tracking-widest pointer-events-none z-50 whitespace-nowrap bg-black/90 shadow-2xl ${
                isPositive ? 'text-emerald-400 border-emerald-500' : 'text-red-500 border-red-600'
            }`;
            alertBox.textContent = text;
            container.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 1200);
        }

        function renderBoard(gridEl, board, hits, isOwn = false) {
            const hitShipIdCounts = {};
            const totalShipIdCounts = {};
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const id = board[y][x];
                    if (id > 0) {
                        totalShipIdCounts[id] = (totalShipIdCounts[id] || 0) + 1;
                        if (hits.some(h => h.x === x && h.y === y)) {
                            hitShipIdCounts[id] = (hitShipIdCounts[id] || 0) + 1;
                        }
                    }
                }
            }

            Array.from(gridEl.children).forEach(cell => {
                const x = +cell.dataset.x;
                const y = +cell.dataset.y;
                const shipId = board[y][x];
                
                cell.className = 'cell'; 
                
                if (isOwn && shipId > 0) cell.classList.add('own-ship');
                
                const hasBeenShot = hits.some(h => h.x === x && h.y === y);
                if (hasBeenShot) {
                    if (shipId > 0) {
                        if (hitShipIdCounts[shipId] === totalShipIdCounts[shipId]) {
                            cell.classList.add('sunk');
                            cell.innerHTML = '<i class="fas fa-skull text-white animate-pulse"></i>';
                        } else {
                            cell.classList.add('hit');
                            // Little fire particle simulation layer element
                            cell.innerHTML = '<i class="fas fa-fire text-amber-500 animate-bounce text-[14px]"></i>';
                        }
                    } else {
                        cell.classList.add('miss');
                        cell.innerHTML = '<div class="w-1.5 h-1.5 bg-sky-200/60 rounded-full animate-ping"></div>';
                    }
                } else {
                    cell.innerHTML = '';
                }
            });
        }

        function sendChatMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg || !gameRef) return;
            
            gameRef.child('chat').push({
                player: myPlayerId,
                text: msg,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = '';
        }

        function appendChatMessage(data) {
            const container = document.getElementById('chat-messages');
            
            // Clean dynamic structural fallback default message labels
            if (container.querySelector('.italic')) {
                container.innerHTML = '';
            }
            
            const item = document.createElement('div');
            const isMe = data.player === myPlayerId;
            item.className = `p-2 rounded-lg max-w-[85%] border leading-tight ${
                isMe ? 'bg-blue-950/40 border-blue-800 text-blue-200 ml-auto' : 'bg-slate-900 border-slate-700 text-slate-200 mr-auto'
            }`;
            
            item.innerHTML = `<span class="block font-bold text-[8px] mb-1 opacity-60">${data.player.toUpperCase()}</span>${escapeHTML(data.text)}`;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function checkEndGameCondition() {
            let localHitsOnEnemy = 0;
            let enemyHitsOnMe = 0;
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (opponentBoard[y][x] > 0 && hitsOnOpponent.some(h => h.x === x && h.y === y)) localHitsOnEnemy++;
                    if (playerBoard[y][x] > 0 && hitsOnMe.some(h => h.x === x && h.y === y)) enemyHitsOnMe++;
                }
            }

            if (localHitsOnEnemy === TOTAL_SHIP_TILES) {
                triggerGameOverModal(true);
            } else if (enemyHitsOnMe === TOTAL_SHIP_TILES) {
                triggerGameOverModal(false);
            }
        }

        function triggerGameOverModal(isVictory) {
            gameRef.child('turn').off();
            gameRef.child('moves').off();
            
            const modal = document.getElementById('win-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const subtitle = document.getElementById('modal-subtitle');
            
            if (isVictory) {
                icon.textContent = "🏆";
                title.textContent = "VICTORY";
                title.className = "text-xl font-bold mb-2 text-emerald-400";
                subtitle.textContent = "Outstanding tactical maneuver, Commander. Enemy forces liquidated.";
            } else {
                icon.textContent = "💥";
                title.textContent = "DEFEAT";
                title.className = "text-xl font-bold mb-2 text-red-500";
                subtitle.textContent = "Your flagships are down. Fleet retreat protocol initiated.";
            }
            modal.classList.remove('hidden');
        }

        // Direct room configuration reset targeting persistent instances bypassing window reloads
        async function requestRematch() {
            document.getElementById('win-modal').classList.add('hidden');
            
            // Both clients reset individual placement confirmation parameters concurrently
            await gameRef.child(myPlayerId).set({ ready: false, board: "" });
            
            // Only host handles root-level matrix structural resets to avoid racing locks
            if (myPlayerId === 'player1') {
                await gameRef.update({
                    phase: 'setup',
                    moves: null,
                    turn: 'player1'
                });
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') {
                toggleRotation();
                const hovered = document.querySelector('.cell:hover');
                if (hovered && setupGrid && setupGrid.contains(hovered)) {
                    previewShip(+hovered.dataset.x, +hovered.dataset.y);
                }
            }
        });

        window.onload = () => {
            console.log("🚢 FLEET INTERFACES ONLINE.");
        };
    </script>
</body>
</html>
