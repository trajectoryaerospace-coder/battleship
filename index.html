<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLESHIP • NAVAL WARFARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(180deg, #020617 0%, #0a1428 100%);
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 3px;
            background: #0f1f3a;
            padding: 8px;
            border: 12px solid #1e3a5f;
            border-radius: 20px;
            box-shadow: 0 0 70px rgba(59, 130, 246, 0.7);
        }
        
        .cell {
            width: 38px;
            height: 38px;
            background: #1e40af;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #93c5fd;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #60a5fa;
            position: relative;
        }
        
        .cell:hover {
            background: #60a5fa;
            transform: scale(1.1);
        }
        
        .cell.own-ship {
            background: #22c55e;
            box-shadow: inset 0 0 15px #22c55e;
        }
        
        .cell.hit {
            background: #ef4444;
            animation: explosion 0.6s;
        }
        
        .cell.miss {
            background: #64748b;
        }
        
        .cell.sunk {
            background: #b91c1c;
        }
        
        @keyframes explosion {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
        
        .ship-preview {
            background: rgba(134, 239, 172, 0.7) !important;
            border: 3px dashed #86efac;
        }
        
        .header-font {
            text-shadow: 0 0 25px #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto p-8">
        <h1 class="text-6xl font-bold text-center mb-10 text-blue-400 header-font">BATTLESHIP</h1>

        <!-- MENU -->
        <div id="menu-screen" class="text-center">
            <button onclick="findOpponent()" class="block mx-auto mb-8 px-16 py-8 bg-emerald-600 hover:bg-emerald-700 text-3xl font-bold rounded-3xl w-[500px]">
                FIND OPPONENT
            </button>
        </div>

        <!-- MATCHMAKING -->
        <div id="matchmaking-screen" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50">
            <div class="text-center">
                <div class="text-8xl mb-8 animate-pulse">⚓</div>
                <h2 class="text-4xl font-bold">SEARCHING FOR OPPONENT...</h2>
                <button onclick="cancelMatchmaking()" class="mt-12 px-10 py-5 bg-red-600 rounded-2xl">CANCEL</button>
            </div>
        </div>

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="hidden">
            <div class="flex justify-center gap-16">
                <div>
                    <h2 class="text-3xl font-bold text-emerald-400 text-center mb-6">PLACE YOUR FLEET (15x15)</h2>
                    <div id="setup-board" class="grid mx-auto" style="width: 630px;"></div>
                    
                    <div class="mt-8 flex justify-center gap-6">
                        <button onclick="toggleRotation()" id="rotate-btn"
                                class="px-10 py-5 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold flex items-center gap-3">
                            <i class="fas fa-sync-alt"></i> ROTATE (R)
                        </button>
                        <button onclick="randomPlacement()" 
                                class="px-10 py-5 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold">RANDOM</button>
                    </div>
                    
                    <div class="text-center mt-10">
                        <button onclick="confirmReady()" id="ready-btn"
                                class="px-20 py-6 bg-emerald-500 hover:bg-emerald-600 text-black text-2xl font-bold rounded-3xl disabled:opacity-50">
                            READY TO BATTLE
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden grid grid-cols-2 gap-12">
            <div>
                <h2 class="text-emerald-400 text-2xl font-bold text-center mb-4">YOUR FLEET</h2>
                <div id="player-board-game" class="grid mx-auto" style="width: 630px;"></div>
            </div>
            <div>
                <h2 class="text-red-400 text-2xl font-bold text-center mb-4">ENEMY WATERS</h2>
                <div id="opponent-board" class="grid mx-auto" style="width: 630px;"></div>
            </div>
        </div>

        <!-- STATUS -->
        <div id="status-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 border-4 border-yellow-400 px-12 py-6 rounded-3xl text-2xl font-bold hidden">
            <span id="status-text"></span>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-slate-900 border-8 border-yellow-400 p-16 rounded-3xl text-center">
            <div id="modal-icon" class="text-9xl mb-6"></div>
            <h2 id="modal-title" class="text-6xl font-bold mb-4"></h2>
            <p id="modal-subtitle" class="text-xl mb-10"></p>
            <button onclick="location.reload()" class="px-16 py-6 bg-white text-black text-2xl font-bold rounded-3xl">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDEeoUNuFrJImksTlnBpL6H1CKrozCwvKY",
            authDomain: "battleshipforzan.firebaseapp.com",
            projectId: "battleshipforzan",
            storageBucket: "battleshipforzan.firebasestorage.app",
            messagingSenderId: "131379626805",
            appId: "1:131379626805:web:981d95d5db353b70d9427c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GRID_SIZE = 15;
        let roomId = null;
        let myPlayerId = null;
        let gameRef = null;
        let playerBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let opponentBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let myShips = [];
        let opponentShips = [];
        let hitsOnMe = [];
        let hitsOnOpponent = [];
        let currentShipIndex = 0;
        let isVertical = true;
        let isMyTurn = false;
        let gameStarted = false;
        let setupGrid = null;
        let playerGameGrid = null;
        let opponentGameGrid = null;

        const SHIP_TYPES = [
            {id:1, name:"CARRIER", size:5},
            {id:2, name:"BATTLESHIP", size:4},
            {id:3, name:"CRUISER", size:3},
            {id:4, name:"SUBMARINE", size:3},
            {id:5, name:"DESTROYER", size:2}
        ];

        function createGrid(id, isSetup = false) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    if (isSetup) {
                        cell.addEventListener('click', () => placeShip(x, y));
                        cell.addEventListener('mouseover', () => previewShip(x, y));
                        cell.addEventListener('mouseout', clearPreview);
                    } else if (id === 'opponent-board') {
                        cell.addEventListener('click', () => fireShot(x, y));
                    }
                    container.appendChild(cell);
                }
            }
            return container;
        }

        function renderBoard(gridEl, board, hits, isOwn = false) {
            Array.from(gridEl.children).forEach(cell => {
                const x = +cell.dataset.x;
                const y = +cell.dataset.y;
                cell.classList.remove('own-ship', 'hit', 'miss', 'sunk');
                
                if (isOwn && board[y][x] > 0) cell.classList.add('own-ship');
                
                const hitHere = hits.some(h => h.x === x && h.y === y);
                if (hitHere) {
                    cell.classList.add(board[y][x] > 0 ? 'hit' : 'miss');
                }
            });
        }

        function previewShip(x, y) {
            clearPreview();
            if (currentShipIndex >= SHIP_TYPES.length) return;
            const ship = SHIP_TYPES[currentShipIndex];
            for (let i = 0; i < ship.size; i++) {
                const cx = isVertical ? x : x + i;
                const cy = isVertical ? y + i : y;
                if (cx >= GRID_SIZE || cy >= GRID_SIZE || playerBoard[cy][cx] !== 0) break;
                const cell = getCell(setupGrid, cx, cy);
                if (cell) cell.classList.add('ship-preview');
            }
        }

        function clearPreview() {
            document.querySelectorAll('.ship-preview').forEach(c => c.classList.remove('ship-preview'));
        }

        function getCell(grid, x, y) {
            return Array.from(grid.children).find(c => +c.dataset.x === x && +c.dataset.y === y);
        }

        function placeShip(x, y) {
            if (currentShipIndex >= SHIP_TYPES.length) return;
            const ship = SHIP_TYPES[currentShipIndex];
            let valid = true;
            const positions = [];
            
            for (let i = 0; i < ship.size; i++) {
                const cx = isVertical ? x : x + i;
                const cy = isVertical ? y + i : y;
                if (cx >= GRID_SIZE || cy >= GRID_SIZE || playerBoard[cy][cx] !== 0) {
                    valid = false;
                    break;
                }
                positions.push({x: cx, y: cy});
            }
            
            if (!valid) return;
            
            positions.forEach(p => playerBoard[p.y][p.x] = ship.id);
            
            myShips.push({
                id: ship.id,
                size: ship.size,
                hits: 0,
                positions: positions
            });
            
            currentShipIndex++;
            renderBoard(setupGrid, playerBoard, [], true);
            
            if (currentShipIndex >= SHIP_TYPES.length) {
                document.getElementById('ready-btn').disabled = false;
            }
        }

        function toggleRotation() {
            isVertical = !isVertical;
        }

        function randomPlacement() {
            playerBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            myShips = [];
            currentShipIndex = 0;
            
            SHIP_TYPES.forEach((ship, idx) => {
                let placed = false;
                let tries = 0;
                while (!placed && tries < 200) {
                    tries++;
                    const vert = Math.random() > 0.5;
                    const maxX = vert ? GRID_SIZE : GRID_SIZE - ship.size;
                    const maxY = vert ? GRID_SIZE - ship.size : GRID_SIZE;
                    const sx = Math.floor(Math.random() * maxX);
                    const sy = Math.floor(Math.random() * maxY);
                    
                    let ok = true;
                    for (let i = 0; i < ship.size; i++) {
                        const cx = vert ? sx : sx + i;
                        const cy = vert ? sy + i : sy;
                        if (playerBoard[cy][cx] !== 0) ok = false;
                    }
                    if (ok) {
                        for (let i = 0; i < ship.size; i++) {
                            const cx = vert ? sx : sx + i;
                            const cy = vert ? sy + i : sy;
                            playerBoard[cy][cx] = ship.id;
                        }
                        myShips.push({id: ship.id, size: ship.size, hits: 0, positions: []});
                        placed = true;
                    }
                }
            });
            currentShipIndex = SHIP_TYPES.length;
            renderBoard(setupGrid, playerBoard, [], true);
            document.getElementById('ready-btn').disabled = false;
        }

        async function findOpponent() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('matchmaking-screen').classList.remove('hidden');
            
            const queueRef = db.ref('queue');
            const myTicket = queueRef.push({ts: Date.now()});
            
            queueRef.on('value', async (snap) => {
                const q = snap.val();
                if (!q) return;
                const keys = Object.keys(q);
                if (keys.length >= 2) {
                    const p1 = keys[0];
                    const p2 = keys[1];
                    if (p1 === myTicket.key || p2 === myTicket.key) {
                        roomId = 'room_' + Date.now();
                        gameRef = db.ref('games/' + roomId);
                        myPlayerId = p1 === myTicket.key ? 'player1' : 'player2';
                        
                        await gameRef.set({
                            player1: {ready: false, board: null},
                            player2: {ready: false, board: null},
                            turn: 'player1',
                            phase: 'setup'
                        });
                        
                        queueRef.child(p1).remove();
                        queueRef.child(p2).remove();
                        
                        enterSetupPhase();
                    }
                }
            });
        }

        function cancelMatchmaking() {
            document.getElementById('matchmaking-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function enterSetupPhase() {
            document.getElementById('matchmaking-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            
            playerBoard = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            myShips = [];
            currentShipIndex = 0;
            setupGrid = createGrid('setup-board', true);
            renderBoard(setupGrid, playerBoard, [], true);
            document.getElementById('ready-btn').disabled = true;
            
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                
                if (data.player1.ready && data.player2.ready && !gameStarted) {
                    startFullGame(data);
                }
            });
        }

        function confirmReady() {
            if (currentShipIndex < SHIP_TYPES.length) {
                alert("Place all ships first!");
                return;
            }
            gameRef.child(myPlayerId).update({ready: true, board: JSON.stringify(playerBoard)});
        }

        function startFullGame(gameData) {
            gameStarted = true;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            playerGameGrid = createGrid('player-board-game', false);
            opponentGameGrid = createGrid('opponent-board', false);
            
            // Load opponent board
            const oppKey = myPlayerId === 'player1' ? 'player2' : 'player1';
            if (gameData[oppKey] && gameData[oppKey].board) {
                opponentBoard = JSON.parse(gameData[oppKey].board);
            }
            
            renderBoard(playerGameGrid, playerBoard, hitsOnMe, true);
            renderBoard(opponentGameGrid, opponentBoard, hitsOnOpponent, false);
            
            // Listen for moves
            gameRef.child('moves').on('child_added', (snap) => {
                const move = snap.val();
                if (move.player !== myPlayerId) {
                    handleOpponentMove(move);
                }
            });
        }

        function handleOpponentMove(move) {
            hitsOnMe.push({x: move.x, y: move.y});
            renderBoard(playerGameGrid, playerBoard, hitsOnMe, true);
            isMyTurn = true;
            document.getElementById('status-text').textContent = "YOUR TURN";
        }

        function fireShot(x, y) {
            if (!isMyTurn) return;
            if (hitsOnOpponent.some(h => h.x === x && h.y === y)) return;
            
            hitsOnOpponent.push({x, y});
            const hit = opponentBoard[y][x] > 0;
            
            renderBoard(opponentGameGrid, opponentBoard, hitsOnOpponent, false);
            
            gameRef.child('moves').push({
                player: myPlayerId,
                x: x,
                y: y,
                hit: hit
            });
            
            isMyTurn = false;
            document.getElementById('status-text').textContent = "OPPONENT'S TURN";
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') {
                isVertical = !isVertical;
            }
        });

        window.onload = () => {
            console.log("🚢 FULL BATTLESHIP READY - 15x15 GRID");
        };
    </script>
</body>
</html>
