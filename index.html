<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLESHIP • MULTIPLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: linear-gradient(180deg, #020617, #0a1428); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #0f1f3a; padding: 4px; border: 8px solid #1e3a5f; border-radius: 12px; box-shadow: 0 0 40px rgba(59, 130, 246, 0.4); }
        .cell { width: 38px; height: 38px; background: #1e40af; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #93c5fd; cursor: pointer; transition: all 0.2s; border: 1px solid #3b82f6; }
        .cell:hover { background: #60a5fa; transform: scale(1.08); }
        .cell.own-ship { background: #22c55e; box-shadow: inset 0 0 12px rgba(34,197,94,0.7); }
        .cell.hit { background: #ef4444; animation: explosion 0.5s; }
        .cell.miss { background: #64748b; }
        @keyframes explosion { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
        .ship-preview { background: rgba(134, 239, 172, 0.5) !important; border: 2px dashed #86efac; }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mb-8 text-blue-400">BATTLESHIP</h1>

        <!-- Menu -->
        <div id="menu-screen" class="text-center">
            <button onclick="startSinglePlayer()" class="block mx-auto mb-6 px-12 py-6 bg-blue-600 hover:bg-blue-700 text-2xl rounded-3xl font-bold w-96">
                PLAY VS AI
            </button>
            <button onclick="findOpponent()" class="block mx-auto px-12 py-6 bg-emerald-600 hover:bg-emerald-700 text-2xl rounded-3xl font-bold w-96">
                FIND OPPONENT
            </button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden grid grid-cols-2 gap-10">
            <div>
                <h2 class="text-emerald-400 text-2xl font-bold mb-3">YOUR FLEET</h2>
                <div id="player-board" class="grid mx-auto" style="width: 440px;"></div>
            </div>
            <div>
                <h2 class="text-red-400 text-2xl font-bold mb-3">ENEMY WATERS</h2>
                <div id="opponent-board" class="grid mx-auto" style="width: 440px;"></div>
            </div>
        </div>

        <!-- Matchmaking -->
        <div id="matchmaking" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
            <div class="text-center">
                <div class="text-7xl mb-6 animate-pulse">⚓</div>
                <h2 class="text-3xl font-bold mb-2">SEARCHING FOR OPPONENT</h2>
                <p class="text-slate-400 mb-8">This may take a few seconds...</p>
                <button onclick="cancelMatchmaking()" class="px-8 py-4 bg-red-600 hover:bg-red-700 rounded-2xl font-bold">CANCEL</button>
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-yellow-400 px-8 py-3 rounded-xl text-lg font-bold hidden"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDEeoUNuFrJImksTlnBpL6H1CKrozCwvKY",
            authDomain: "battleshipforzan.firebaseapp.com",
            projectId: "battleshipforzan",
            storageBucket: "battleshipforzan.firebasestorage.app",
            messagingSenderId: "131379626805",
            appId: "1:131379626805:web:981d95d5db353b70d9427c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SIZE = 10;
        let roomId = null;
        let myPlayerId = null;
        let isMyTurn = false;
        let gameMode = 'single';
        let playerBoard = [], opponentBoard = [];
        let myShips = [], opponentShips = [];
        let hitsOnMe = [], hitsOnOpponent = [];
        let gameRef = null;
        let playerGrid, opponentGrid;

        const SHIPS = [5,4,3,3,2];

        // Create Board
        function createBoard(id, isPlayer) {
            const grid = document.getElementById(id);
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;

            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;

                    if (isPlayer) {
                        cell.addEventListener('click', () => handlePlacementClick(x, y));
                    } else {
                        cell.addEventListener('click', () => handleFire(x, y));
                    }
                    grid.appendChild(cell);
                }
            }
            return grid;
        }

        function renderBoards() {
            // Player board
            Array.from(playerGrid.children).forEach(c => {
                const x = +c.dataset.x, y = +c.dataset.y;
                c.classList.toggle('own-ship', playerBoard[y][x] > 0);
                c.classList.toggle('hit', hitsOnMe.some(h => h.x === x && h.y === y));
            });

            // Opponent board
            Array.from(opponentGrid.children).forEach(c => {
                const x = +c.dataset.x, y = +c.dataset.y;
                c.classList.remove('hit', 'miss');
                if (hitsOnOpponent.some(h => h.x === x && h.y === y)) {
                    c.classList.add(opponentBoard[y][x] > 0 ? 'hit' : 'miss');
                }
            });
        }

        // ================== MATCHMAKING ==================
        async function findOpponent() {
            gameMode = 'multi';
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('matchmaking').classList.remove('hidden');

            const queueRef = db.ref('queue');
            const myTicket = queueRef.push({ timestamp: Date.now() });

            // Listen for match
            queueRef.on('value', async (snap) => {
                const queue = snap.val();
                if (!queue) return;

                const players = Object.keys(queue);
                if (players.length >= 2) {
                    const p1 = players[0];
                    const p2 = players[1];

                    if (p1 === myTicket.key || p2 === myTicket.key) {
                        roomId = 'room_' + Date.now();
                        gameRef = db.ref('games/' + roomId);

                        myPlayerId = p1 === myTicket.key ? 'player1' : 'player2';

                        await gameRef.set({
                            player1: { ready: false, board: null },
                            player2: { ready: false, board: null },
                            turn: 'player1',
                            status: 'playing'
                        });

                        // Remove both from queue
                        queueRef.child(p1).remove();
                        queueRef.child(p2).remove();

                        startMultiplayerGame();
                    }
                }
            });
        }

        function cancelMatchmaking() {
            document.getElementById('matchmaking').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            if (gameRef) gameRef.remove();
        }

        function startMultiplayerGame() {
            document.getElementById('matchmaking').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initGameBoards();

            // Listen for game updates
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;

                isMyTurn = data.turn === myPlayerId;
                document.getElementById('status').classList.remove('hidden');
                document.getElementById('status').textContent = isMyTurn ? "YOUR TURN - FIRE!" : "OPPONENT'S TURN";
            });
        }

        // ================== GAME LOGIC ==================
        function initGameBoards() {
            playerGrid = createBoard('player-board', true);
            opponentGrid = createBoard('opponent-board', false);
            playerBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            opponentBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            hitsOnMe = [];
            hitsOnOpponent = [];
            myShips = [];
            renderBoards();
        }

        function handlePlacementClick(x, y) {
            if (myShips.length >= SHIPS.length) return;

            const size = SHIPS[myShips.length];
            const vertical = Math.random() > 0.5; // You can add rotate button later

            if (canPlaceShip(playerBoard, x, y, size, vertical)) {
                for (let i = 0; i < size; i++) {
                    const cx = vertical ? x : x + i;
                    const cy = vertical ? y + i : y;
                    playerBoard[cy][cx] = myShips.length + 1;
                }
                myShips.push(size);
                renderBoards();

                if (myShips.length === SHIPS.length) {
                    // Auto ready when all ships placed
                    gameRef.child(myPlayerId).update({ ready: true, board: JSON.stringify(playerBoard) });
                }
            }
        }

        function canPlaceShip(board, x, y, size, vertical) {
            for (let i = 0; i < size; i++) {
                const cx = vertical ? x : x + i;
                const cy = vertical ? y + i : y;
                if (cx >= SIZE || cy >= SIZE || board[cy][cx] !== 0) return false;
            }
            return true;
        }

        function handleFire(x, y) {
            if (!isMyTurn || hitsOnOpponent.some(h => h.x === x && h.y === y)) return;

            hitsOnOpponent.push({x, y});

            const hit = opponentBoard[y][x] > 0;
            renderBoards();

            gameRef.child('moves').push({
                player: myPlayerId,
                x, y,
                hit: hit,
                time: Date.now()
            });

            isMyTurn = false;
        }

        function startSinglePlayer() {
            gameMode = 'single';
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initGameBoards();
            placeRandomOpponentShips();
        }

        function placeRandomOpponentShips() {
            opponentBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            opponentShips = [];
            SHIPS.forEach((size, i) => {
                let placed = false;
                while (!placed) {
                    const vertical = Math.random() > 0.5;
                    const x = Math.floor(Math.random() * (vertical ? SIZE : SIZE - size));
                    const y = Math.floor(Math.random() * (vertical ? SIZE - size : SIZE));
                    if (canPlaceShip(opponentBoard, x, y, size, vertical)) {
                        for (let j = 0; j < size; j++) {
                            const cx = vertical ? x : x + j;
                            const cy = vertical ? y + j : y;
                            opponentBoard[cy][cx] = i + 1;
                        }
                        opponentShips.push(size);
                        placed = true;
                    }
                }
            });
            renderBoards();
        }

        // Reset
        function resetToMenu() {
            location.reload();
        }

        window.onload = () => {
            console.log("%cBATTLESHIP MULTIPLAYER READY", "color: #22d3ee; font-size: 16px");
        };
    </script>
</body>
</html>
