<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLESHIP • LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; background: linear-gradient(180deg, #020617, #0a1428); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #0f1f3a; padding: 4px; border: 8px solid #1e3a5f; border-radius: 12px; box-shadow: 0 0 40px rgba(59, 130, 246, 0.4); }
        .cell { width: 38px; height: 38px; background: #1e40af; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #93c5fd; cursor: pointer; transition: all 0.2s; border: 1px solid #3b82f6; }
        .cell:hover { background: #60a5fa; transform: scale(1.08); }
        .cell.own-ship { background: #22c55e; box-shadow: inset 0 0 12px rgba(34,197,94,0.7); }
        .cell.hit { background: #ef4444; animation: explosion 0.5s; }
        .cell.miss { background: #64748b; }
        @keyframes explosion { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mb-10 text-blue-400">BATTLESHIP</h1>

        <!-- Main Menu -->
        <div id="menu-screen">
            <div class="max-w-md mx-auto space-y-6">
                <button onclick="createLobby()" 
                        class="w-full py-6 bg-emerald-600 hover:bg-emerald-700 text-2xl font-bold rounded-3xl">
                    CREATE LOBBY
                </button>
                
                <button onclick="showJoinScreen()" 
                        class="w-full py-6 bg-blue-600 hover:bg-blue-700 text-2xl font-bold rounded-3xl">
                    JOIN LOBBY
                </button>

                <button onclick="startSinglePlayer()" 
                        class="w-full py-6 bg-slate-600 hover:bg-slate-700 text-2xl font-bold rounded-3xl">
                    PLAY VS AI
                </button>
            </div>
        </div>

        <!-- Join Screen -->
        <div id="join-screen" class="hidden max-w-md mx-auto">
            <input id="join-code" type="text" maxlength="6" placeholder="ENTER 6-DIGIT CODE" 
                   class="w-full text-center text-3xl py-6 bg-slate-800 border-4 border-blue-500 rounded-3xl focus:outline-none">
            <button onclick="joinLobby()" 
                    class="mt-6 w-full py-6 bg-emerald-600 hover:bg-emerald-700 text-2xl font-bold rounded-3xl">
                    JOIN GAME
            </button>
            <button onclick="backToMenu()" class="mt-4 text-slate-400">← Back</button>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="hidden text-center">
            <h2 class="text-3xl mb-4">LOBBY CODE</h2>
            <div id="lobby-code-display" class="text-6xl font-bold text-yellow-400 tracking-widest mb-8"></div>
            <p class="text-slate-400 mb-6">Share this code with your friend</p>
            <button onclick="copyCode()" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl">COPY CODE</button>
            <div id="lobby-status" class="mt-8 text-lg"></div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden grid grid-cols-2 gap-10">
            <div>
                <h2 class="text-emerald-400 text-2xl font-bold mb-3">YOUR FLEET</h2>
                <div id="player-board" class="grid mx-auto" style="width: 440px;"></div>
            </div>
            <div>
                <h2 class="text-red-400 text-2xl font-bold mb-3">ENEMY WATERS</h2>
                <div id="opponent-board" class="grid mx-auto" style="width: 440px;"></div>
            </div>
        </div>

        <!-- Status Bar -->
        <div id="status-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-yellow-400 px-8 py-3 rounded-xl text-lg font-bold hidden"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDEeoUNuFrJImksTlnBpL6H1CKrozCwvKY",
            authDomain: "battleshipforzan.firebaseapp.com",
            projectId: "battleshipforzan",
            storageBucket: "battleshipforzan.firebasestorage.app",
            messagingSenderId: "131379626805",
            appId: "1:131379626805:web:981d95d5db353b70d9427c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SIZE = 10;
        let roomId = null;
        let myPlayerId = null; // 'player1' = host
        let gameRef = null;
        let playerBoard = [], opponentBoard = [];
        let myShips = [], opponentShips = [];
        let hitsOnMe = [], hitsOnOpponent = [];
        let isMyTurn = false;
        let playerGrid, opponentGrid;

        const SHIPS = [5, 4, 3, 3, 2];

        function createBoard(id, isPlayer) {
            const grid = document.getElementById(id);
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;

            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;

                    if (isPlayer) cell.addEventListener('click', () => handlePlacement(x, y));
                    else cell.addEventListener('click', () => handleFire(x, y));

                    grid.appendChild(cell);
                }
            }
            return grid;
        }

        function renderBoards() {
            Array.from(playerGrid.children).forEach(c => {
                const x = +c.dataset.x, y = +c.dataset.y;
                c.classList.toggle('own-ship', playerBoard[y][x] > 0);
                c.classList.toggle('hit', hitsOnMe.some(h => h.x === x && h.y === y));
            });

            Array.from(opponentGrid.children).forEach(c => {
                const x = +c.dataset.x, y = +c.dataset.y;
                c.classList.remove('hit', 'miss');
                if (hitsOnOpponent.some(h => h.x === x && h.y === y)) {
                    c.classList.add(opponentBoard[y][x] > 0 ? 'hit' : 'miss');
                }
            });
        }

        // ================== LOBBY SYSTEM ==================
        async function createLobby() {
            roomId = 'room_' + Math.random().toString(36).substring(2, 8).toUpperCase();
            gameRef = db.ref('games/' + roomId);

            myPlayerId = 'player1';

            await gameRef.set({
                player1: { ready: false, board: null },
                player2: { ready: false, board: null },
                status: 'waiting',
                turn: 'player1'
            });

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('lobby-code-display').textContent = roomId.substring(5);

            startListening();
        }

        function showJoinScreen() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('join-screen').classList.remove('hidden');
        }

        async function joinLobby() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (code.length !== 6) return alert("Code must be 6 characters!");

            roomId = 'room_' + code;
            gameRef = db.ref('games/' + roomId);

            const snapshot = await gameRef.once('value');
            const data = snapshot.val();

            if (!data || data.player2 && data.player2.ready !== false) {
                alert("Lobby not found or full!");
                return;
            }

            myPlayerId = 'player2';
            await gameRef.child('player2').set({ ready: false, board: null });

            document.getElementById('join-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('lobby-code-display').textContent = code;

            startListening();
        }

        function startListening() {
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;

                if (data.player1.ready && data.player2.ready && document.getElementById('game-screen').classList.contains('hidden')) {
                    startGame();
                }
            });
        }

        function copyCode() {
            navigator.clipboard.writeText(roomId.substring(5));
            alert("Code copied!");
        }

        function backToMenu() {
            if (gameRef) gameRef.remove();
            location.reload();
        }

        // ================== GAME ==================
        function startGame() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            playerGrid = createBoard('player-board', true);
            opponentGrid = createBoard('opponent-board', false);

            playerBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            opponentBoard = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            hitsOnMe = [];
            hitsOnOpponent = [];
            myShips = [];

            renderBoards();
            document.getElementById('status-bar').classList.remove('hidden');
        }

        function handlePlacement(x, y) {
            if (myShips.length >= SHIPS.length) return;

            const size = SHIPS[myShips.length];
            const vertical = Math.random() > 0.5;

            if (canPlace(playerBoard, x, y, size, vertical)) {
                for (let i = 0; i < size; i++) {
                    const cx = vertical ? x : x + i;
                    const cy = vertical ? y + i : y;
                    playerBoard[cy][cx] = myShips.length + 1;
                }
                myShips.push(size);
                renderBoards();

                if (myShips.length === SHIPS.length) {
                    gameRef.child(myPlayerId).update({
                        ready: true,
                        board: JSON.stringify(playerBoard)
                    });
                }
            }
        }

        function canPlace(board, x, y, size, vertical) {
            for (let i = 0; i < size; i++) {
                const cx = vertical ? x : x + i;
                const cy = vertical ? y + i : y;
                if (cx >= SIZE || cy >= SIZE || board[cy][cx] !== 0) return false;
            }
            return true;
        }

        function handleFire(x, y) {
            if (!isMyTurn) return alert("Not your turn!");
            if (hitsOnOpponent.some(h => h.x === x && h.y === y)) return;

            hitsOnOpponent.push({x, y});
            const hit = opponentBoard[y][x] > 0;

            renderBoards();

            gameRef.child('moves').push({ player: myPlayerId, x, y, hit });
            isMyTurn = false;
            updateStatus();
        }

        function updateStatus() {
            document.getElementById('status-bar').textContent = isMyTurn ? "YOUR TURN - FIRE!" : "WAITING FOR OPPONENT...";
        }

        function startSinglePlayer() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            playerGrid = createBoard('player-board', true);
            opponentGrid = createBoard('opponent-board', false);
            // ... (AI logic same as before)
            alert("VS AI mode coming soon in next update!");
        }

        window.onload = () => console.log("%cBATTLESHIP LOBBY READY ⚓", "color:#22d3ee;font-size:16px");
    </script>
</body>
</html>
